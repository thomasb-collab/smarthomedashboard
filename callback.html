<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Homey — Ansluter...</title>
<style>
  body{background:#0f1117;color:#e8eaf0;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
  .box{text-align:center;max-width:400px;padding:2rem}
  h2{font-weight:500;margin-bottom:.5rem}
  p{color:#8b90a7;font-size:14px;word-break:break-all}
</style>
</head>
<body>
<div class="box">
  <h2 id="msg">Ansluter till Homey...</h2>
  <p id="sub">Startar...</p>
</div>
<script>
const WORKER = 'https://spring-bird-4ad8.thomas-bodegrim.workers.dev';
const HOMEY_ID = '5d93218fa2d1260c4cbd184d';
const params = new URLSearchParams(window.location.search);
const code = params.get('code');

function setStatus(msg, sub) {
  document.getElementById('msg').textContent = msg;
  document.getElementById('sub').textContent = sub;
}

async function post(path, body) {
  const r = await fetch(`${WORKER}${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

async function connect() {
  if (!code) { setStatus('Fel', 'Ingen code i URL:en'); return; }

  setStatus('Ansluter...', 'Steg 1 — Hämtar access token');
  const tokenData = await post('/token', { code });
  if (!tokenData.access_token) { setStatus('Token-fel', JSON.stringify(tokenData)); return; }
  const { access_token, refresh_token } = tokenData;

  setStatus('Ansluter...', 'Steg 2 — Förbereder Homey-anslutning');
  const remote_url = `https://${HOMEY_ID}.connect.athom.com`;

  setStatus('Ansluter...', 'Steg 3 — Skapar delegation token');
  const delegData = await post('/delegation', { access_token });
  if (!delegData.delegation_token) { setStatus('Fel steg 3', JSON.stringify(delegData).substring(0,200)); return; }
  const delegation_token = delegData.delegation_token;

  // Spara access_token som session_token och fortsätt
  localStorage.setItem('homey_session_token', access_token);
  localStorage.setItem('homey_delegation_token', delegation_token);
  localStorage.setItem('homey_remote_url', remote_url);
  localStorage.setItem('homey_access_token', access_token);
  localStorage.setItem('homey_refresh_token', refresh_token);
  setStatus('Ansluten!', 'Återgår till dashboarden...');
  setTimeout(() => { window.location.href = './'; }, 1500);
}

connect();
</script>
</body>
</html>
