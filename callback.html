<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Homey — Ansluter...</title>
<style>
  body{background:#0f1117;color:#e8eaf0;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
  .box{text-align:center;max-width:400px;padding:2rem}
  h2{font-weight:500;margin-bottom:.5rem}
  p{color:#8b90a7;font-size:14px;word-break:break-all}
</style>
</head>
<body>
<div class="box">
  <h2 id="msg">Ansluter till Homey...</h2>
  <p id="sub">Steg 1 av 4 — Hämtar token</p>
</div>
<script>
const WORKER = 'https://spring-bird-4ad8.thomas-bodegrim.workers.dev';
const params = new URLSearchParams(window.location.search);
const code = params.get('code');

function setStatus(msg, sub) {
  document.getElementById('msg').textContent = msg;
  document.getElementById('sub').textContent = sub;
}

async function post(path, body) {
  const r = await fetch(`${WORKER}${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

async function connect() {
  if (!code) { setStatus('Fel', 'Ingen code i URL:en'); return; }

  // Steg 1: Byt code mot access_token
  setStatus('Ansluter...', 'Steg 1 av 4 — Hämtar access token');
  const tokenData = await post('/token', { code });
  if (!tokenData.access_token) { setStatus('Token-fel', JSON.stringify(tokenData)); return; }
  const { access_token, refresh_token } = tokenData;

  // Steg 2: Hämta användarinfo + Homey remoteUrl
  setStatus('Ansluter...', 'Steg 2 av 4 — Hämtar Homey-info');
  const userInfo = await post('/userinfo', { access_token });
  const homeys = userInfo.homeys || [];
  if (!homeys.length) { setStatus('Fel', 'Inga Homeys: ' + JSON.stringify(userInfo).substring(0,200)); return; }
  const homey = homeys[0];
  const remote_url = homey.remoteUrl || homey.localUrlSecure || homey.localUrl;
  setStatus('Debug', `remoteUrl: ${remote_url} | keys: ${Object.keys(homey).join(', ')}`);

  // Steg 3: Hämta delegation token
  setStatus('Ansluter...', 'Steg 3 av 4 — Skapar delegation token');
  const delegData = await post('/delegation', { access_token });
  if (!delegData.delegation_token) { setStatus('Fel', JSON.stringify(delegData)); return; }
  const { delegation_token } = delegData;

  // Steg 4: Skapa Homey-session med timeout
  setStatus('Ansluter...', 'Steg 4 av 4 — Skapar Homey-session');
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 10000);
    const r = await fetch(`${WORKER}/session`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ delegation_token, remote_url }),
      signal: ctrl.signal
    });
    clearTimeout(tid);
    const sessionData = await r.json();

    if (sessionData.session_token) {
      localStorage.setItem('homey_session_token', sessionData.session_token);
      localStorage.setItem('homey_remote_url', remote_url);
      localStorage.setItem('homey_access_token', access_token);
      localStorage.setItem('homey_refresh_token', refresh_token);
      setStatus('Ansluten!', 'Återgår till dashboarden...');
      setTimeout(() => { window.location.href = './'; }, 1500);
    } else {
      setStatus('Session-fel', JSON.stringify(sessionData).substring(0,200));
    }
  } catch(e) {
    // Timeout eller annat fel — spara vad vi har och fortsätt
    setStatus('Session timeout', 'Fortsätter utan lokal session...');
    localStorage.setItem('homey_access_token', access_token);
    localStorage.setItem('homey_refresh_token', refresh_token);
    localStorage.setItem('homey_remote_url', remote_url);
    setTimeout(() => { window.location.href = './'; }, 2000);
  }
}

connect();
</script>
</body>
</html>
